<div class="search-trigger-container">
    <button class="search-trigger" (click)="openModal()" [disabled]="!(searchService.isReady | async)">
        <span class="search-trigger-left">
            <span class="search-icon">🔍</span>
            <span class="search-text">Search...</span>
        </span>
        <span class="search-shortcut">⌘ K</span>
    </button>
</div>

<!-- Modal Dialog Structure -->
<dialog #searchDialog class="search-modal" (click)="onDialogClick($event)">

    <!-- Search Input Header -->
    <div class="search-modal-header">
        <span class="search-modal-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </span>
        <input #modalInput type="text" [value]="searchQuery" (input)="onSearch($event)" placeholder="Search..."
            class="search-modal-input" (keydown)="onKeydown($event)" />

        <div class="search-modal-actions">
            <button class="search-clear" *ngIf="searchQuery" (click)="clearSearch(modalInput)">Clear the
                query</button>
            <div class="search-divider" *ngIf="searchQuery"></div>
            <button class="search-close" (click)="closeModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Search Results Body -->
    <div class="search-modal-body">
        <!-- Results List -->
        <ng-container *ngIf="results.length > 0">
            <div class="result-list">
                <ng-container *ngFor="let group of groupedResults">
                    <div class="search-section-title">{{ group.category }}</div>
                    <a *ngFor="let result of group.items; let i = index" (click)="navigateTo(result.route, $event)"
                        class="result-item" [class.selected]="results.indexOf(result) === selectedIndex"
                        (mouseenter)="selectedIndex = results.indexOf(result)">
                        <div class="result-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <div class="result-content">
                            <span class="result-title">{{ result.title }}</span>
                        </div>
                        <div class="result-enter-hint" *ngIf="results.indexOf(result) === selectedIndex">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 10 4 15 9 20"></polyline>
                                <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                            </svg>
                        </div>
                    </a>
                </ng-container>
            </div>
        </ng-container>

        <!-- Empty State -->
        <div class="search-empty-state" *ngIf="searchQuery && results.length === 0">
            <div class="empty-icon">🌱</div>
            <p>No results found for "<strong>{{ searchQuery }}</strong>"</p>
            <p class="empty-subtext">Try searching for concepts like 'Architecture', 'EKS', or 'Database'.</p>
        </div>

        <!-- Default State -->
        <div class="search-default-state" *ngIf="!searchQuery">
            Type something to start searching the enterprise catalog...
        </div>
    </div>

    <!-- Footer Shortcuts -->
    <div class="search-modal-footer">
        <div class="shortcuts">
            <span class="key-hint"><kbd>↓</kbd> <kbd>↑</kbd> Navigate</span>
            <span class="key-hint"><kbd>↵</kbd> Select</span>
            <span class="key-hint"><kbd>esc</kbd> Close</span>
        </div>
        <div class="footer-powered">
            Powered by <span class="brand-algolia">FlexSearch</span>
        </div>
    </div>
</dialog>
